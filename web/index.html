<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pocketduel — Poker Equity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0d17;
    --surface:   #16162a;
    --surface2:  #1e1e38;
    --text:      #e2e8f0;
    --muted:     #6b7280;
    --hand1:     #4f9cf9;
    --hand1-bg:  #1e3a5f;
    --hand2:     #f97316;
    --hand2-bg:  #3d1f0a;
    --hand3:     #22c55e;
    --hand3-bg:  #0a3d1f;
    --hand4:     #a855f7;
    --hand4-bg:  #2d1a4e;
    --red-suit:  #ef4444;
    --card-bg:   #f0ede8;
    --card-text: #111111;
    --active:    #fbbf24;
    --empty-border: #6060a8;
    --empty-color:  #7070b8;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Atkinson Hyperlegible Mono", ui-monospace, monospace;
    font-optical-sizing: auto;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  /* ── Picker section (left panel desktop / fixed bottom mobile) ── */
  .picker-section {
    background: var(--surface);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    padding: 6px 5px 8px;
    border-top: 3px solid #4a4a8a;
  }

  .picker-section-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    margin-bottom: 5px;
    flex-shrink: 0;
    display: none;
  }

  /* ── Main section ── */
  .main-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Scrollable content ── */
  .matchup-scroll {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 16px 12px 10px;
  }

  /* ── Hands display ── */
  .hands-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .hand-group {
    display: flex;
    position: relative;
  }

  .hole-cards-row {
    display: flex;
    gap: 6px;
  }

  .vs-separator {
    display: flex;
    align-items: center;
    position: relative;
  }

  .vs-text {
    font-size: clamp(20px, 5.5vmin, 30px);
    font-weight: 900;
    color: var(--text);
    align-self: center;
    padding: 0 6px;
    letter-spacing: -0.03em;
    opacity: 0.55;
  }

  /* ── Card slots ── */
  .hole-slot {
    width: clamp(44px, 13vmin, 64px);
    height: clamp(62px, 18vmin, 90px);
    border: 2px dashed var(--empty-border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--empty-color);
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }

  /* Subtle color hint per hand */
  [data-hand="1"] .hole-slot { border-color: #3a5888; color: #5a78b8; }
  [data-hand="2"] .hole-slot { border-color: #703820; color: #a05030; }
  [data-hand="3"] .hole-slot { border-color: #1a5c35; color: #30a855; }
  [data-hand="4"] .hole-slot { border-color: #4a2080; color: #8055d0; }

  .hole-slot.slot-active {
    border: 2.5px solid var(--active) !important;
    box-shadow: 0 0 10px rgba(251, 191, 36, 0.45), 0 0 20px rgba(251, 191, 36, 0.15);
    color: var(--active);
  }

  .hole-slot.filled {
    border: none;
    cursor: pointer;
    padding: 0;
    color: inherit;
  }

  .hole-slot.filled:hover {
    filter: brightness(0.82);
  }

  .hole-slot.filled.slot-active {
    outline: 2.5px solid var(--active);
    outline-offset: 3px;
    border: none;
    box-shadow: 0 0 10px rgba(251, 191, 36, 0.45);
    cursor: pointer;
  }

  .hole-slot.filled .card {
    width: 100%;
    height: 100%;
    margin: 0;
    border-radius: 6px;
  }

  /* Portrait playing card */
  .card {
    background: var(--card-bg);
    color: var(--card-text);
    border-radius: 6px;
    width: clamp(44px, 13vmin, 64px);
    height: clamp(62px, 18vmin, 90px);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 3px 5px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.55);
    position: relative;
    flex-shrink: 0;
  }

  .card .rank {
    font-size: clamp(18px, 5.5vmin, 28px);
    font-weight: 800;
    line-height: 1;
    align-self: flex-start;
  }

  .card .suit-sym {
    font-size: clamp(18px, 5.5vmin, 28px);
    line-height: 1;
    align-self: flex-end;
  }

  .card .red   { color: var(--red-suit); }
  .card .black { color: #111; }

  /* ── Community cards section ── */
  .community-section {
    padding: 0 2px 10px;
    display: flex;
    justify-content: center;
    transition: opacity 0.2s;
  }

  /* Dimmed when hole cards are incomplete */
  .community-section.dimmed {
    opacity: 0.3;
    pointer-events: none;
  }

  .board-slots {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .board-slot-gap {
    width: 12px;
  }

  .board-slot {
    width: clamp(36px, 10.5vmin, 56px);
    height: clamp(50px, 14.5vmin, 78px);
    border: 2px dashed var(--empty-border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--empty-color);
    font-size: 18px;
    font-weight: 700;
    cursor: default;
    flex-shrink: 0;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }

  .board-slot.slot-active {
    border: 2.5px solid var(--active) !important;
    box-shadow: 0 0 10px rgba(251, 191, 36, 0.45), 0 0 20px rgba(251, 191, 36, 0.15);
    color: var(--active);
  }

  .board-slot.filled {
    border: none;
    cursor: pointer;
    padding: 0;
    color: inherit;
  }

  .board-slot.filled:hover {
    filter: brightness(0.82);
  }

  .board-slot.filled.slot-active {
    outline: 2.5px solid var(--active);
    outline-offset: 3px;
    border: none;
    box-shadow: 0 0 10px rgba(251, 191, 36, 0.45);
    cursor: pointer;
  }

  .board-slot.filled .card {
    width: 100%;
    height: 100%;
    margin: 0;
    border-radius: 6px;
  }

  /* ── Equity bar — always visible, always same size ── */
  .equity-bar {
    flex-shrink: 0;
    padding: 10px 14px;
    border-top: 2px solid #3a3a6a;
    background: var(--surface);
  }

  .equity-bar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .equity-bar .stage-label {
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: opacity 0.2s;
    min-height: 1em;
  }

  /* Disabled state: hide labels & splits but keep their height */
  .equity-bar.disabled .bar-labels { visibility: hidden; }
  .equity-bar.disabled .splits-line { visibility: hidden; }

  /* ── Equity bars ── */
  .equity-section { display: flex; flex-direction: column; gap: 10px; }

  .split-bar-wrap {
    position: relative; height: 30px; border-radius: 6px;
    overflow: hidden; background: #2a2a4a;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
  }

  .split-bar { display: flex; height: 100%; }

  .bar-segment {
    transition: width 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    height: 100%;
  }

  .bar-labels {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 5px;
    min-height: 1em;
  }

  .pct-label {
    font-size: clamp(16px, 3.5vw, 24px);
    font-weight: 700;
    transition: opacity 0.2s;
    min-width: 4ch;
  }

  /* 2-way: last label right-aligned */
  .bar-labels:not(.nway) .pct-label:last-child {
    text-align: right;
  }

  /* N-way: evenly distributed, slightly smaller */
  .bar-labels.nway {
    justify-content: space-around;
  }

  .bar-labels.nway .pct-label {
    font-size: clamp(13px, 2.8vw, 18px);
    text-align: center;
    flex: 1;
  }

  .splits-line {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    margin-top: 5px;
    min-height: 1em;
  }

  .error-msg {
    text-align: center;
    color: #f87171;
    font-size: 11px;
    padding: 8px;
    line-height: 1.5;
  }

  /* ── Card picker grid ── */
  .card-picker-grid {
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    gap: 2px;
    flex: 1;
  }

  .picker-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    padding: 3px 1px;
    border-radius: 3px;
    cursor: pointer;
    user-select: none;
    background: var(--surface2);
    border: 1px solid transparent;
    transition: filter 0.1s;
  }

  .picker-cell:hover:not(.picker-disabled) {
    filter: brightness(1.5);
  }

  .picker-rank {
    font-size: clamp(11px, 3.2vmin, 15px);
    font-weight: 800;
    line-height: 1;
  }

  .picker-suit {
    font-size: clamp(9px, 2.5vmin, 12px);
    line-height: 1;
  }

  .picker-cell.suit-red   { color: var(--red-suit); }
  .picker-cell.suit-black { color: #c0c8d8; }

  .picker-cell.picker-disabled {
    opacity: 0.16;
    cursor: default;
    pointer-events: none;
  }

  /* ── Hand-group color underlines ── */
  [data-hand="1"] {
    border-bottom: 3px solid var(--hand1);
    padding-bottom: 6px;
  }

  [data-hand="2"] {
    border-bottom: 3px solid var(--hand2);
    padding-bottom: 6px;
  }

  [data-hand="3"] {
    border-bottom: 3px solid var(--hand3);
    padding-bottom: 6px;
  }

  [data-hand="4"] {
    border-bottom: 3px solid var(--hand4);
    padding-bottom: 6px;
  }

  /* ── Add / remove player buttons ── */
  .add-player-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px dashed var(--empty-border);
    background: transparent;
    color: var(--empty-color);
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    align-self: center;
    flex-shrink: 0;
  }

  .add-player-btn:hover {
    border-color: var(--active);
    color: var(--active);
  }

  .remove-player-btn {
    position: absolute;
    top: -6px;
    right: -6px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #333;
    color: #999;
    border: 1px solid #555;
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    padding: 0;
  }

  .remove-player-btn:hover {
    background: #c53030;
    color: white;
    border-color: #c53030;
  }

  /* ── Monte Carlo info ── */
  .mc-info {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    position: relative;
  }

  .mc-margin {
    font-size: 11px;
    color: var(--muted);
  }

  .mc-icon {
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }

  .mc-icon:hover {
    color: var(--text);
  }

  .mc-popover {
    position: absolute;
    bottom: calc(100% + 8px);
    right: 0;
    background: var(--surface2);
    border: 1px solid #3a3a6a;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 11px;
    color: var(--text);
    line-height: 1.5;
    width: 260px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    z-index: 200;
    display: none;
  }

  /* ── Multi-way hands on mobile ── */
  .hands-display.multi-way {
    flex-direction: column;
    gap: 4px;
  }

  .hands-display.multi-way .vs-text {
    font-size: clamp(14px, 3.5vmin, 20px);
    padding: 0 4px;
  }

  /* ── Mobile layout ── */
  @media (max-width: 767px) {
    body { overflow: hidden; }

    .picker-section {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      padding: 5px 4px calc(8px + env(safe-area-inset-bottom, 0px));
      border-top: 3px solid #5555a0;
    }

    .main-section {
      overflow-y: auto;
      padding-bottom: 186px;
    }

    .matchup-scroll {
      padding: 14px 10px 10px;
    }
  }

  /* ── Desktop layout ── */
  @media (min-width: 768px) {
    body { flex-direction: row; }

    .picker-section {
      flex: 0 0 36%;
      border-top: none;
      border-right: 2px solid #3a3a6a;
      padding: 12px 10px;
      overflow-y: auto;
      justify-content: flex-start;
    }

    .picker-section-label {
      display: block;
    }

    .card-picker-grid {
      flex: none;
    }

    .picker-cell {
      padding: 6px 2px;
    }

    .picker-rank {
      font-size: clamp(12px, 1.3vw, 17px);
    }

    .picker-suit {
      font-size: clamp(10px, 1.0vw, 13px);
    }

    .main-section {
      flex: 1;
      overflow: hidden;
    }

    .matchup-scroll {
      padding: 20px 28px 12px;
    }

    .hole-slot {
      width: clamp(48px, 7.5vw, 74px);
      height: clamp(68px, 10.5vw, 104px);
    }

    .card {
      width: clamp(48px, 7.5vw, 74px);
      height: clamp(68px, 10.5vw, 104px);
    }

    .board-slot {
      width: clamp(38px, 5.8vw, 60px);
      height: clamp(54px, 8.2vw, 84px);
    }

    .equity-bar {
      padding: 12px 28px;
    }

    /* Multi-way stays horizontal on desktop but uses smaller cards */
    .hands-display.multi-way {
      flex-direction: row;
      gap: 8px;
    }

    .hands-display.multi-way .hole-slot {
      width: clamp(38px, 5.5vw, 56px);
      height: clamp(54px, 7.8vw, 78px);
    }

    .hands-display.multi-way .card {
      width: clamp(38px, 5.5vw, 56px);
      height: clamp(54px, 7.8vw, 78px);
    }

    .hands-display.multi-way .vs-text {
      font-size: clamp(16px, 2.5vw, 24px);
      padding: 0 3px;
    }
  }
</style>
</head>
<body>

<!-- Picker section: left panel (desktop) / fixed bottom (mobile) -->
<div class="picker-section" id="pickerSection">
  <div class="picker-section-label">Select a Card</div>
  <div class="card-picker-grid" id="cardPickerGrid"></div>
</div>

<!-- Main section: right panel (desktop) / scrollable content (mobile) -->
<div class="main-section">
  <div class="matchup-scroll" id="matchupScroll">

    <!-- Hole cards display (built dynamically by JS) -->
    <div class="hands-display" id="handsDisplay"></div>

    <!-- Community cards: shown when hands complete or board has any card -->
    <div class="community-section" id="communitySection" style="display:none">
      <div class="board-slots" id="boardSlots"></div>
    </div>

  </div>

  <!-- Equity bar: always visible, built dynamically by JS -->
  <div class="equity-bar disabled" id="equityBar"></div>
</div>

<script src="postflop.js"></script>
<script src="montecarlo.js"></script>
<script>

// ── Constants ───────────────────────────────────────────────────────────────

const BOARD_OFFSET = 8; // activeSlot values 8-12 = board slots 0-4

const PICKER_RANKS = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
const PICKER_SUITS = [
  { ch: 's', sym: '\u2660', cls: 'suit-black' },
  { ch: 'h', sym: '\u2665', cls: 'suit-red'   },
  { ch: 'd', sym: '\u2666', cls: 'suit-red'   },
  { ch: 'c', sym: '\u2663', cls: 'suit-black' },
];

const SUIT_MAP = {
  h: { sym: '\u2665', cls: 'red'   },
  d: { sym: '\u2666', cls: 'red'   },
  c: { sym: '\u2663', cls: 'black' },
  s: { sym: '\u2660', cls: 'black' },
};

const HAND_COLORS = [
  'var(--hand1)', 'var(--hand2)', 'var(--hand3)', 'var(--hand4)'
];

function buildHandOrder() {
  const order = [];
  for (let i = 0; i < 13; i++) order.push(PICKER_RANKS[i] + PICKER_RANKS[i]);
  for (let i = 0; i < 12; i++)
    for (let j = i + 1; j < 13; j++)
      order.push(PICKER_RANKS[i] + PICKER_RANKS[j] + 's');
  for (let i = 0; i < 12; i++)
    for (let j = i + 1; j < 13; j++)
      order.push(PICKER_RANKS[i] + PICKER_RANKS[j] + 'o');
  return order;
}

const HAND_TYPE_ORDER = buildHandOrder();

// ── State ───────────────────────────────────────────────────────────────────

let numPlayers = 2;
let holeCards  = [null, null, null, null, null, null, null, null]; // max 4 players × 2
let boardCards = [null, null, null, null, null]; // sparse 5-slot array
let activeSlot = 0;   // 0-7=hole, 8-12=board slot, null=all done
let preflopEquity = null; // 2-way preflop JSON data
let currentMCId = null;   // active Monte Carlo run ID

// ── Helpers ─────────────────────────────────────────────────────────────────

function handsComplete() {
  for (let i = 0; i < numPlayers * 2; i++) {
    if (!holeCards[i]) return false;
  }
  return true;
}

function activeBoardCards() {
  return boardCards.filter(c => c !== null);
}

function getAllUsedCards() {
  const used = new Set();
  for (let i = 0; i < numPlayers * 2; i++) {
    if (holeCards[i]) used.add(holeCards[i]);
  }
  for (const c of boardCards) { if (c) used.add(c); }
  return used;
}

function findFirstEmptyHoleSlot() {
  for (let i = 0; i < numPlayers * 2; i++) {
    if (!holeCards[i]) return i;
  }
  return null;
}

// Find next empty board slot, searching from afterBoardIdx+1 then wrapping.
function nextEmptyBoardSlot(afterBoardIdx) {
  for (let i = afterBoardIdx + 1; i < 5; i++) {
    if (!boardCards[i]) return BOARD_OFFSET + i;
  }
  for (let i = 0; i <= afterBoardIdx; i++) {
    if (!boardCards[i]) return BOARD_OFFSET + i;
  }
  return null; // all 5 filled
}

function getActiveHands() {
  const hands = [];
  for (let p = 0; p < numPlayers; p++) {
    hands.push([holeCards[p * 2], holeCards[p * 2 + 1]]);
  }
  return hands;
}

function getStageLabel() {
  const n = activeBoardCards().length;
  if (n === 0) return 'Pre-flop';
  const labels = { 1: '1 Card', 2: '2 Cards', 3: 'Flop', 4: 'Turn', 5: 'River' };
  return labels[n] || '';
}

function cardsToHandType(c1, c2) {
  const r1 = c1[0], r2 = c2[0], s1 = c1[1], s2 = c2[1];
  const i1 = PICKER_RANKS.indexOf(r1), i2 = PICKER_RANKS.indexOf(r2);
  if (i1 === i2) return r1 + r2;
  const [hi, lo] = i1 < i2 ? [r1, r2] : [r2, r1];
  return hi + lo + (s1 === s2 ? 's' : 'o');
}

function getMatchupInfo(ht1, ht2) {
  const i1 = HAND_TYPE_ORDER.indexOf(ht1);
  const i2 = HAND_TYPE_ORDER.indexOf(ht2);
  if (i1 <= i2) return { file: `equity_data/${ht1}_vs_${ht2}.json`, swapped: false };
  return { file: `equity_data/${ht2}_vs_${ht1}.json`, swapped: true };
}

function cancelMC() {
  if (currentMCId !== null) {
    Multiway.cancel();
    currentMCId = null;
  }
}

// ── Card rendering ───────────────────────────────────────────────────────────

function renderCard(token) {
  const rank = token[0] === 'T' ? '10' : token[0];
  const suit = SUIT_MAP[token[1]] || { sym: token[1], cls: 'black' };
  const div = document.createElement('div');
  div.className = 'card';
  const rankEl = document.createElement('span');
  rankEl.className = 'rank ' + suit.cls;
  rankEl.textContent = rank;
  const suitEl = document.createElement('span');
  suitEl.className = 'suit-sym ' + suit.cls;
  suitEl.textContent = suit.sym;
  div.appendChild(rankEl);
  div.appendChild(suitEl);
  return div;
}

// ── Build dynamic hand groups ────────────────────────────────────────────────

function buildHandsDisplay() {
  const container = document.getElementById('handsDisplay');
  container.innerHTML = '';
  container.className = 'hands-display' + (numPlayers > 2 ? ' multi-way' : '');

  for (let p = 0; p < numPlayers; p++) {
    if (p > 0) {
      const vs = document.createElement('div');
      vs.className = 'vs-separator';
      const vsText = document.createElement('span');
      vsText.className = 'vs-text';
      vsText.textContent = 'vs';
      vs.appendChild(vsText);
      container.appendChild(vs);
    }

    const group = document.createElement('div');
    group.className = 'hand-group';
    group.id = 'handGroup' + (p + 1);
    group.dataset.hand = String(p + 1);

    // Remove button on last player (only if >2 players)
    if (p === numPlayers - 1 && numPlayers > 2) {
      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove-player-btn';
      removeBtn.textContent = '\u00d7';
      removeBtn.title = 'Remove player';
      removeBtn.onclick = removePlayer;
      group.appendChild(removeBtn);
    }

    const row = document.createElement('div');
    row.className = 'hole-cards-row';
    for (let c = 0; c < 2; c++) {
      const slot = document.createElement('div');
      slot.className = 'hole-slot';
      slot.id = 'holeSlot' + (p * 2 + c);
      row.appendChild(slot);
    }
    group.appendChild(row);
    container.appendChild(group);
  }

  // Add player button (up to 4)
  if (numPlayers < 4) {
    const addBtn = document.createElement('button');
    addBtn.className = 'add-player-btn';
    addBtn.textContent = '+';
    addBtn.title = 'Add player';
    addBtn.onclick = addPlayer;
    container.appendChild(addBtn);
  }
}

// ── Add / remove players ─────────────────────────────────────────────────────

function addPlayer() {
  if (numPlayers >= 4) return;
  numPlayers++;
  cancelMC();
  preflopEquity = null;

  // Active slot → first empty hole slot (the new player's first slot)
  activeSlot = findFirstEmptyHoleSlot();

  buildHandsDisplay();
  buildEquityBar();
  renderAll();
  updateEquityBar();
  pushHash();
}

function removePlayer() {
  if (numPlayers <= 2) return;
  const removedStart = (numPlayers - 1) * 2;
  holeCards[removedStart] = null;
  holeCards[removedStart + 1] = null;
  numPlayers--;
  cancelMC();
  preflopEquity = null;

  // Adjust activeSlot if it was on removed player's slots
  if (activeSlot !== null && activeSlot >= removedStart && activeSlot < removedStart + 2) {
    activeSlot = findFirstEmptyHoleSlot();
    if (activeSlot === null) activeSlot = nextEmptyBoardSlot(-1);
  }

  buildHandsDisplay();
  buildEquityBar();
  renderAll();
  updateEquityBar();
  pushHash();

  if (numPlayers === 2 && handsComplete()) fetchPreflopEquity();
}

// ── Slot actions ─────────────────────────────────────────────────────────────

function setActiveSlot(i) {
  activeSlot = i;
  renderSlots();
  renderPickerGrid();
}

function clearHoleSlot(i) {
  holeCards[i] = null;
  activeSlot = i;
  cancelMC();
  preflopEquity = null;
  // Keep boardCards — community section stays visible but dimmed
  renderAll();
  updateEquityBar();
  pushHash();
}

function clearBoardSlot(i) {
  boardCards[i] = null;
  activeSlot = BOARD_OFFSET + i;
  cancelMC();
  renderSlots();
  renderPickerGrid();
  updateEquityBar();
  pushHash();
}

// ── Picker click ──────────────────────────────────────────────────────────────

function onPickerClick(cardStr) {
  if (activeSlot === null) return;

  if (activeSlot < numPlayers * 2) {
    // Hole card
    holeCards[activeSlot] = cardStr;

    const nextHole = findFirstEmptyHoleSlot();
    if (nextHole !== null) {
      activeSlot = nextHole;
    } else {
      // All hole cards filled → go to first empty board slot
      activeSlot = nextEmptyBoardSlot(-1);
      if (numPlayers === 2) fetchPreflopEquity();
    }

    renderAll();
    updateEquityBar();
    pushHash();

  } else if (activeSlot >= BOARD_OFFSET && activeSlot < BOARD_OFFSET + 5) {
    const boardIdx = activeSlot - BOARD_OFFSET;
    boardCards[boardIdx] = cardStr;
    activeSlot = nextEmptyBoardSlot(boardIdx);
    renderSlots();
    renderPickerGrid();
    updateEquityBar();
    pushHash();
  }
}

// ── 2-way preflop equity fetch ───────────────────────────────────────────────

async function fetchPreflopEquity() {
  if (numPlayers !== 2 || !handsComplete()) return;

  const ht1 = cardsToHandType(holeCards[0], holeCards[1]);
  const ht2 = cardsToHandType(holeCards[2], holeCards[3]);
  const { file, swapped } = getMatchupInfo(ht1, ht2);

  updateEquityBar(); // show loading state

  try {
    const resp = await fetch(file);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const p1 = swapped ? data.win_pct2 : data.win_pct1;
    const p2 = swapped ? data.win_pct1 : data.win_pct2;
    preflopEquity = { pct1: p1, pct2: p2, tiePct: data.tie_pct, total: data.total };
    updateEquityBar();
  } catch (e) {
    document.getElementById('equityStageLabel').textContent = `Could not load ${ht1} vs ${ht2}`;
    document.getElementById('equityBar').classList.add('disabled');
  }
}

// ── Equity bar — routing ─────────────────────────────────────────────────────

function updateEquityBar() {
  if (!handsComplete()) {
    cancelMC();
    setEquityDisabled('Select hole cards to see equity');
    return;
  }

  if (numPlayers === 2) {
    cancelMC();
    update2WayEquity();
  } else {
    updateNWayEquity();
  }
}

function update2WayEquity() {
  const board = activeBoardCards();

  if (board.length === 0) {
    if (!preflopEquity) {
      setEquityDisabled('Loading equity\u2026');
      return;
    }
    const { pct1, pct2, tiePct, total } = preflopEquity;
    setEquity2Way('Pre-flop', pct1, pct2, tiePct, total);
    return;
  }

  const h1 = [holeCards[0], holeCards[1]];
  const h2 = [holeCards[2], holeCards[3]];
  const result = Postflop.calculateEquity(h1, h2, board);
  if (!result) {
    setEquityDisabled('Calculating\u2026');
    return;
  }

  const { pct1, pct2, tiePct, total } = result;
  const labels = { 1: '1 Card', 2: '2 Cards', 3: 'Flop', 4: 'Turn', 5: 'River' };
  setEquity2Way(labels[board.length] || '', pct1, pct2, tiePct, total);
}

function updateNWayEquity() {
  const board = activeBoardCards();
  const hands = getActiveHands();
  const needed = 5 - board.length;
  const stage = getStageLabel();

  cancelMC();

  if (needed <= 2) {
    // Exact N-way enumeration
    const result = Multiway.calculateExact(hands, board);
    setEquityNWay(stage, result.equities, result.splitPct, result.total, result.margin, result.isExact, result.done);
  } else {
    // Monte Carlo
    setEquityDisabled('Estimating\u2026');
    currentMCId = Multiway.run(hands, board, function(update) {
      setEquityNWay(stage, update.equities, update.splitPct, update.total, update.margin, update.isExact, update.done);
    });
  }
}

// ── Equity bar — rendering ───────────────────────────────────────────────────

function setEquityDisabled(msg) {
  document.getElementById('equityBar').classList.add('disabled');
  document.getElementById('equityStageLabel').textContent = msg;

  for (let i = 0; i < numPlayers; i++) {
    const seg = document.getElementById('barSeg' + i);
    if (seg) seg.style.width = '0%';
  }

  const tie = document.getElementById('barTie');
  if (tie) tie.style.width = '100%';

  const mcInfo = document.getElementById('mcInfo');
  if (mcInfo) mcInfo.style.display = 'none';
}

function setEquity2Way(stage, pct1, pct2, tiePct, total) {
  document.getElementById('equityBar').classList.remove('disabled');

  updateStageLabel(stage);

  document.getElementById('barSeg0').style.width = pct1 + '%';
  document.getElementById('barSeg1').style.width = pct2 + '%';
  document.getElementById('barTie').style.width = tiePct + '%';

  flashUpdate('pctLabel0', pct1.toFixed(2) + '%');
  flashUpdate('pctLabel1', pct2.toFixed(2) + '%');

  const splitsEl = document.getElementById('splitsLine');
  if (activeBoardCards().length === 5) {
    splitsEl.textContent = 'Final board';
  } else {
    splitsEl.textContent = `Split: ${tiePct.toFixed(2)}% \u00b7 ${total.toLocaleString()} possible boards`;
  }

  const mcInfo = document.getElementById('mcInfo');
  if (mcInfo) mcInfo.style.display = 'none';
}

function setEquityNWay(stage, equities, splitPct, total, margin, isExact, done) {
  document.getElementById('equityBar').classList.remove('disabled');

  updateStageLabel(stage);

  // Update bar segments
  for (let i = 0; i < numPlayers; i++) {
    const seg = document.getElementById('barSeg' + i);
    if (seg) seg.style.width = equities[i] + '%';
  }

  // Update percentage labels
  const prefix = isExact ? '' : '~';
  for (let i = 0; i < numPlayers; i++) {
    flashUpdate('pctLabel' + i, prefix + equities[i].toFixed(1) + '%');
  }

  // Splits line
  const splitsEl = document.getElementById('splitsLine');
  if (isExact) {
    if (activeBoardCards().length === 5) {
      splitsEl.textContent = 'Final board';
    } else {
      splitsEl.textContent = `Split: ${splitPct.toFixed(1)}% \u00b7 ${total.toLocaleString()} possible boards`;
    }
  } else {
    const progress = done ? '' : '\u2026';
    splitsEl.textContent = `${total.toLocaleString()} samples${progress} \u00b7 \u00b1${margin.toFixed(2)}%`;
  }

  // MC info
  const mcInfo = document.getElementById('mcInfo');
  if (mcInfo) {
    mcInfo.style.display = isExact ? 'none' : '';
  }
}

function updateStageLabel(text) {
  const el = document.getElementById('equityStageLabel');
  if (!el) return;
  if (el.textContent !== text) {
    el.style.opacity = '0.3';
    requestAnimationFrame(() => {
      el.textContent = text;
      el.style.opacity = '';
    });
  }
}

function flashUpdate(id, newText) {
  const el = document.getElementById(id);
  if (!el || el.textContent === newText) return;
  el.style.opacity = '0.3';
  requestAnimationFrame(() => {
    el.textContent = newText;
    requestAnimationFrame(() => { el.style.opacity = ''; });
  });
}

// ── Render functions ──────────────────────────────────────────────────────────

function renderSlots() {
  // Hole slots
  for (let i = 0; i < numPlayers * 2; i++) {
    const el = document.getElementById('holeSlot' + i);
    if (!el) continue;

    const card = holeCards[i];
    const isActive = activeSlot === i;

    el.className = 'hole-slot';
    if (isActive) el.classList.add('slot-active');
    el.innerHTML = '';
    el.onclick = null;

    if (card) {
      el.classList.add('filled');
      el.appendChild(renderCard(card));
      el.onclick = () => clearHoleSlot(i);
    } else {
      el.textContent = isActive ? '' : '+';
      el.onclick = () => setActiveSlot(i);
    }
  }

  // Board slots
  const handsOk = handsComplete();
  for (let i = 0; i < 5; i++) {
    const el = document.getElementById('boardSlot' + i);
    if (!el) continue;

    const card = boardCards[i];
    const isActive = activeSlot === BOARD_OFFSET + i;

    el.className = 'board-slot';
    if (isActive && handsOk) el.classList.add('slot-active');
    el.innerHTML = '';
    el.onclick = null;

    if (card) {
      el.classList.add('filled');
      el.appendChild(renderCard(card));
      if (handsOk) el.onclick = () => clearBoardSlot(i);
    } else if (handsOk) {
      el.textContent = isActive ? '' : '+';
      el.onclick = () => setActiveSlot(BOARD_OFFSET + i);
    }
  }
}

function renderPickerGrid() {
  const used = getAllUsedCards();
  const allDone = activeSlot === null;

  for (const suit of PICKER_SUITS) {
    for (const rank of PICKER_RANKS) {
      const cardStr = rank + suit.ch;
      const cell = document.getElementById('picker-' + cardStr);
      if (!cell) continue;
      cell.className = 'picker-cell ' + suit.cls;
      if (used.has(cardStr) || allDone) {
        cell.classList.add('picker-disabled');
      }
    }
  }
}

function renderCommunitySection() {
  const section = document.getElementById('communitySection');
  const hasBoard = boardCards.some(c => c);
  const show = handsComplete() || hasBoard;
  section.style.display = show ? '' : 'none';
  section.classList.toggle('dimmed', show && !handsComplete());
}

function renderAll() {
  renderSlots();
  renderPickerGrid();
  renderCommunitySection();
}

// ── Build permanent DOM structures ────────────────────────────────────────────

function buildPickerGrid() {
  const grid = document.getElementById('cardPickerGrid');
  for (const suit of PICKER_SUITS) {
    for (const rank of PICKER_RANKS) {
      const cardStr = rank + suit.ch;
      const cell = document.createElement('div');
      cell.className = 'picker-cell ' + suit.cls;
      cell.id = 'picker-' + cardStr;
      const rankSpan = document.createElement('span');
      rankSpan.className = 'picker-rank';
      rankSpan.textContent = rank === 'T' ? '10' : rank;
      const suitSpan = document.createElement('span');
      suitSpan.className = 'picker-suit';
      suitSpan.textContent = suit.sym;
      cell.appendChild(rankSpan);
      cell.appendChild(suitSpan);
      cell.addEventListener('click', () => onPickerClick(cardStr));
      grid.appendChild(cell);
    }
  }
}

function buildBoardSlots() {
  const container = document.getElementById('boardSlots');
  container.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    if (i === 3 || i === 4) {
      const gap = document.createElement('div');
      gap.className = 'board-slot-gap';
      container.appendChild(gap);
    }
    const slot = document.createElement('div');
    slot.className = 'board-slot';
    slot.id = 'boardSlot' + i;
    container.appendChild(slot);
  }
}

function buildEquityBar() {
  const bar = document.getElementById('equityBar');
  bar.className = 'equity-bar disabled';
  bar.innerHTML = '';

  // Header: stage label + MC info
  const header = document.createElement('div');
  header.className = 'equity-bar-header';

  const stageLabel = document.createElement('div');
  stageLabel.className = 'stage-label';
  stageLabel.id = 'equityStageLabel';
  stageLabel.textContent = 'Select hole cards to see equity';
  header.appendChild(stageLabel);

  const mcInfo = document.createElement('div');
  mcInfo.className = 'mc-info';
  mcInfo.id = 'mcInfo';
  mcInfo.style.display = 'none';

  const mcMargin = document.createElement('span');
  mcMargin.className = 'mc-margin';
  mcMargin.id = 'mcMargin';
  mcInfo.appendChild(mcMargin);

  const mcIcon = document.createElement('span');
  mcIcon.className = 'mc-icon';
  mcIcon.id = 'mcIcon';
  mcIcon.textContent = '\u24d8';
  mcIcon.title = 'Monte Carlo estimation';
  mcInfo.appendChild(mcIcon);

  const mcPopover = document.createElement('div');
  mcPopover.className = 'mc-popover';
  mcPopover.id = 'mcPopover';
  mcPopover.textContent = 'Equity estimated via Monte Carlo simulation (50,000 random boards). Results are approximate \u2014 see margin of error. Heads-up (2-player) matchups always use exact calculation.';
  mcInfo.appendChild(mcPopover);

  header.appendChild(mcInfo);
  bar.appendChild(header);

  // Equity section
  const section = document.createElement('div');
  section.className = 'equity-section';

  // Split bar
  const barWrap = document.createElement('div');
  barWrap.className = 'split-bar-wrap';
  const splitBar = document.createElement('div');
  splitBar.className = 'split-bar';
  splitBar.id = 'splitBar';

  for (let i = 0; i < numPlayers; i++) {
    const seg = document.createElement('div');
    seg.className = 'bar-segment';
    seg.id = 'barSeg' + i;
    seg.style.width = '0%';
    seg.style.background = HAND_COLORS[i];
    splitBar.appendChild(seg);
  }

  // Tie bar only for 2-way
  if (numPlayers === 2) {
    const tie = document.createElement('div');
    tie.className = 'bar-segment';
    tie.id = 'barTie';
    tie.style.width = '100%';
    tie.style.background = '#44445a';
    splitBar.appendChild(tie);
  }

  barWrap.appendChild(splitBar);
  section.appendChild(barWrap);

  // Bar labels
  const labels = document.createElement('div');
  labels.className = 'bar-labels' + (numPlayers > 2 ? ' nway' : '');
  labels.id = 'barLabels';

  for (let i = 0; i < numPlayers; i++) {
    const lbl = document.createElement('div');
    lbl.className = 'pct-label';
    lbl.id = 'pctLabel' + i;
    lbl.style.color = HAND_COLORS[i];
    labels.appendChild(lbl);
  }

  section.appendChild(labels);

  // Splits line
  const splitsLine = document.createElement('div');
  splitsLine.className = 'splits-line';
  splitsLine.id = 'splitsLine';
  section.appendChild(splitsLine);

  bar.appendChild(section);

  // Set up MC popover toggle
  mcIcon.addEventListener('click', function(e) {
    e.stopPropagation();
    mcPopover.style.display = mcPopover.style.display === 'none' ? '' : 'none';
  });
}

// Close MC popover on outside click
document.addEventListener('click', function() {
  const pop = document.getElementById('mcPopover');
  if (pop) pop.style.display = 'none';
});

// ── URL hash state ────────────────────────────────────────────────────────────
// Format: #h1/h2[/h3[/h4]][:board]
// Each hand: 2 cards as 2-char tokens or "x" for empty.
// Board: 5 slots, 2-char tokens or "x".
// Legacy (2-player): #h1/h2/board (no colon) also supported for loading.

function encodeSlots(slots) {
  return slots.map(c => c || 'x').join('');
}

function parseSlotTokens(str, count) {
  const slots = [];
  let i = 0;
  while (slots.length < count && i < str.length) {
    if (str[i] === 'x') {
      slots.push(null);
      i++;
    } else {
      const c = str.slice(i, i + 2);
      slots.push(
        c.length === 2 && 'AKQJT98765432'.includes(c[0]) && 'hdcs'.includes(c[1]) ? c : null
      );
      i += 2;
    }
  }
  while (slots.length < count) slots.push(null);
  return slots;
}

function pushHash() {
  const anyHole  = holeCards.slice(0, numPlayers * 2).some(c => c);
  const anyBoard = boardCards.some(c => c);
  if (!anyHole && !anyBoard) {
    history.replaceState(null, '', location.pathname);
    return;
  }

  const handParts = [];
  for (let p = 0; p < numPlayers; p++) {
    handParts.push(encodeSlots([holeCards[p * 2], holeCards[p * 2 + 1]]));
  }

  let hash = handParts.join('/');
  if (anyBoard) hash += ':' + encodeSlots(boardCards);
  history.replaceState(null, '', '#' + hash);
}

function loadFromHash() {
  const hash = location.hash.replace('#', '');
  if (!hash) return;

  let handsPart, boardPart;
  if (hash.includes(':')) {
    const colonIdx = hash.indexOf(':');
    handsPart = hash.slice(0, colonIdx);
    boardPart = hash.slice(colonIdx + 1);
  } else {
    // Legacy 2-player format: #h1/h2/board
    const parts = hash.split('/');
    if (parts.length === 3 && parts[2].length >= 5) {
      handsPart = parts[0] + '/' + parts[1];
      boardPart = parts[2];
    } else {
      handsPart = hash;
      boardPart = '';
    }
  }

  const handParts = handsPart.split('/');
  const np = Math.min(Math.max(handParts.length, 2), 4);
  numPlayers = np;

  holeCards = [null, null, null, null, null, null, null, null];
  for (let p = 0; p < np; p++) {
    const slots = parseSlotTokens(handParts[p] || '', 2);
    holeCards[p * 2] = slots[0];
    holeCards[p * 2 + 1] = slots[1];
  }

  boardCards = parseSlotTokens(boardPart || '', 5);

  // Reject duplicate cards
  const all = [...holeCards.slice(0, np * 2), ...boardCards].filter(c => c);
  if (new Set(all).size !== all.length) {
    holeCards = [null, null, null, null, null, null, null, null];
    boardCards = [null, null, null, null, null];
    numPlayers = 2;
    return;
  }

  // Derive activeSlot: first empty hole slot, then first empty board slot
  const firstEmptyHole = findFirstEmptyHoleSlot();
  if (firstEmptyHole !== null) {
    activeSlot = firstEmptyHole;
  } else {
    const boardEmpty = boardCards.findIndex(c => !c);
    activeSlot = boardEmpty === -1 ? null : BOARD_OFFSET + boardEmpty;
  }
}

window.addEventListener('hashchange', function() {
  holeCards  = [null, null, null, null, null, null, null, null];
  boardCards = [null, null, null, null, null];
  activeSlot = 0;
  numPlayers = 2;
  preflopEquity = null;
  cancelMC();
  loadFromHash();
  buildHandsDisplay();
  buildEquityBar();
  renderAll();
  updateEquityBar();
  if (numPlayers === 2 && handsComplete()) fetchPreflopEquity();
});

// ── Init ──────────────────────────────────────────────────────────────────────

loadFromHash();
buildPickerGrid();
buildBoardSlots();
buildHandsDisplay();
buildEquityBar();
renderAll();
updateEquityBar();
if (numPlayers === 2 && handsComplete()) fetchPreflopEquity();
