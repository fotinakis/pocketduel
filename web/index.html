<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pocketduel — Poker Equity</title>
<style>
  :root {
    --bg:        #0d0d17;
    --surface:   #16162a;
    --surface2:  #1e1e38;
    --text:      #e2e8f0;
    --muted:     #6b7280;
    --hand1:     #4f9cf9;
    --hand1-bg:  #1e3a5f;
    --hand2:     #f97316;
    --hand2-bg:  #3d1f0a;
    --red-suit:  #ef4444;
    --card-bg:   #f0ede8;
    --card-text: #111111;
    --active:    #fbbf24;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, 'Cascadia Code', 'Fira Mono', monospace;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  /* ── Picker section (left panel desktop / fixed bottom mobile) ── */
  .picker-section {
    background: var(--surface);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    padding: 6px 5px 8px;
    border-top: 1px solid #2a2a4a;
  }

  .picker-section-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    margin-bottom: 5px;
    flex-shrink: 0;
    display: none; /* hidden on mobile */
  }

  /* ── Main section ── */
  .main-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Scrollable content ── */
  .matchup-scroll {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 14px 12px 10px;
  }

  /* ── Hands display ── */
  .hands-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .hand-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .hand-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
  }

  .hand-label.label-h1 { color: var(--hand1); }
  .hand-label.label-h2 { color: var(--hand2); }

  .hole-cards-row {
    display: flex;
    gap: 5px;
  }

  .vs-text {
    color: var(--muted);
    font-size: 14px;
    font-weight: 600;
    align-self: flex-end;
    padding: 0 2px;
    margin-bottom: 6px;
  }

  /* ── Card slots ── */
  .hole-slot {
    width: clamp(40px, 11vmin, 58px);
    height: clamp(56px, 15vmin, 82px);
    border: 2px dashed #3a3a5a;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #3a3a5a;
    font-size: 16px;
    cursor: default;
    flex-shrink: 0;
    transition: border-color 0.15s, box-shadow 0.15s, outline 0.15s;
    position: relative;
  }

  .hole-slot.slot-active {
    border: 2px solid var(--active) !important;
    box-shadow: 0 0 8px rgba(251, 191, 36, 0.35);
    color: var(--active);
  }

  .hole-slot.filled {
    border: none;
    cursor: pointer;
    padding: 0;
  }

  .hole-slot.filled:hover {
    filter: brightness(0.82);
  }

  .hole-slot.filled.slot-active {
    outline: 2px solid var(--active);
    outline-offset: 2px;
    border: none;
    cursor: pointer;
  }

  .hole-slot.filled .card {
    width: 100%;
    height: 100%;
    margin: 0;
    border-radius: 5px;
  }

  /* Portrait playing card */
  .card {
    background: var(--card-bg);
    color: var(--card-text);
    border-radius: 5px;
    width: clamp(40px, 11vmin, 58px);
    height: clamp(56px, 15vmin, 82px);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 3px 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    position: relative;
    flex-shrink: 0;
  }

  .card .rank {
    font-size: clamp(16px, 5vmin, 26px);
    font-weight: 800;
    line-height: 1;
    align-self: flex-start;
  }

  .card .suit-sym {
    font-size: clamp(16px, 5vmin, 26px);
    line-height: 1;
    align-self: flex-end;
  }

  .card .red   { color: var(--red-suit); }
  .card .black { color: #111; }

  /* ── Community cards section ── */
  .community-section {
    padding: 0 2px 10px;
  }

  .board-slots {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-wrap: wrap;
  }

  .board-slot-gap {
    width: 10px;
  }

  .board-slot {
    width: clamp(34px, 9.5vmin, 52px);
    height: clamp(48px, 13vmin, 72px);
    border: 2px dashed #3a3a5a;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #3a3a5a;
    font-size: 16px;
    cursor: default;
    flex-shrink: 0;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }

  .board-slot.slot-active {
    border: 2px solid var(--active) !important;
    box-shadow: 0 0 8px rgba(251, 191, 36, 0.35);
    color: var(--active);
  }

  .board-slot.filled {
    border: none;
    cursor: pointer;
    padding: 0;
  }

  .board-slot.filled:hover {
    filter: brightness(0.82);
  }

  .board-slot.filled.slot-active {
    outline: 2px solid var(--active);
    outline-offset: 2px;
    border: none;
    cursor: pointer;
  }

  .board-slot.filled .card {
    width: 100%;
    height: 100%;
    margin: 0;
    border-radius: 5px;
  }

  .board-slot.slot-inactive {
    opacity: 0.35;
    pointer-events: none;
  }

  /* ── Equity bar (always visible) ── */
  .equity-bar {
    flex-shrink: 0;
    padding: 10px 12px;
    border-top: 1px solid #2a2a4a;
    background: var(--surface);
    min-height: 42px;
  }

  .equity-bar .stage-label {
    color: var(--muted);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  .equity-placeholder {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 6px 0;
  }

  /* ── Equity bars ── */
  .equity-section { display: flex; flex-direction: column; gap: 10px; }

  .split-bar-wrap { position: relative; height: 28px; border-radius: 6px; overflow: hidden; background: #2a2a4a; }

  .split-bar { display: flex; height: 100%; }

  .bar-h1  { background: var(--hand1); transition: width 0.4s ease; }
  .bar-h2  { background: var(--hand2); transition: width 0.4s ease; }
  .bar-tie { background: #44445a; transition: width 0.4s ease; }

  .bar-labels {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 4px;
  }

  .pct-h1 { color: var(--hand1); font-size: clamp(14px, 3vw, 22px); font-weight: 700; }
  .pct-h2 { color: var(--hand2); font-size: clamp(14px, 3vw, 22px); font-weight: 700; text-align: right; }

  .ties-line {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    margin-top: 6px;
  }

  .loading {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 10px;
  }

  .error-msg {
    text-align: center;
    color: #f87171;
    font-size: 11px;
    padding: 8px;
    line-height: 1.5;
  }

  /* ── Card picker grid ── */
  .card-picker-grid {
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    gap: 2px;
    flex: 1;
  }

  .picker-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    padding: 3px 1px;
    border-radius: 3px;
    cursor: pointer;
    user-select: none;
    background: var(--surface2);
    border: 1px solid transparent;
    transition: all 0.1s;
  }

  .picker-cell:hover:not(.picker-disabled):not(.picker-used) {
    filter: brightness(1.45);
  }

  .picker-rank {
    font-size: clamp(11px, 3.2vmin, 15px);
    font-weight: 800;
    line-height: 1;
  }

  .picker-suit {
    font-size: clamp(9px, 2.5vmin, 12px);
    line-height: 1;
  }

  .picker-cell.suit-red   { color: var(--red-suit); }
  .picker-cell.suit-black { color: #b0b8c8; }

  .picker-cell.picker-disabled {
    opacity: 0.15;
    cursor: not-allowed;
    pointer-events: none;
  }

  .picker-cell.picker-used {
    background: #2a1d60;
    border: 1px solid #5a3fb0;
    cursor: pointer;
    opacity: 0.7;
  }

  .picker-cell.picker-used:hover {
    opacity: 1;
    filter: brightness(1.3);
  }

  /* ── Mobile layout ── */
  @media (max-width: 767px) {
    body { overflow: hidden; }

    .picker-section {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      padding: 5px 4px calc(8px + env(safe-area-inset-bottom, 0px));
      border-top: 2px solid #2a2a4a;
    }

    .main-section {
      overflow-y: auto;
      padding-bottom: 186px;
    }

    .matchup-scroll {
      justify-content: flex-start;
      padding: 14px 10px 10px;
    }
  }

  /* ── Desktop layout ── */
  @media (min-width: 768px) {
    body { flex-direction: row; }

    .picker-section {
      flex: 0 0 36%;
      border-top: none;
      border-right: 1px solid #2a2a4a;
      padding: 12px 10px;
      overflow-y: auto;
      justify-content: flex-start;
    }

    .picker-section-label {
      display: block;
    }

    .card-picker-grid {
      flex: none;
    }

    .picker-cell {
      padding: 6px 2px;
    }

    .picker-rank {
      font-size: clamp(12px, 1.3vw, 17px);
    }

    .picker-suit {
      font-size: clamp(10px, 1.0vw, 13px);
    }

    .main-section {
      flex: 1;
      overflow: hidden;
    }

    .matchup-scroll {
      padding: 20px 24px 12px;
    }

    .hands-display {
      gap: 14px;
    }

    .hole-slot {
      width: clamp(44px, 7vw, 68px);
      height: clamp(60px, 10vw, 96px);
    }

    .card {
      width: clamp(44px, 7vw, 68px);
      height: clamp(60px, 10vw, 96px);
    }

    .board-slot {
      width: clamp(36px, 5.5vw, 56px);
      height: clamp(50px, 8vw, 80px);
    }

    .equity-bar {
      padding: 12px 24px;
    }
  }
</style>
</head>
<body>

<!-- Picker section: left panel (desktop) / fixed bottom (mobile) -->
<div class="picker-section" id="pickerSection">
  <div class="picker-section-label">Select a Card</div>
  <div class="card-picker-grid" id="cardPickerGrid"></div>
</div>

<!-- Main section: right panel (desktop) / scrollable content (mobile) -->
<div class="main-section">
  <div class="matchup-scroll" id="matchupScroll">

    <!-- Hole cards display -->
    <div class="hands-display" id="handsDisplay">
      <div class="hand-group">
        <div class="hand-label label-h1">Hand 1</div>
        <div class="hole-cards-row">
          <div class="hole-slot slot-active" id="holeSlot0"></div>
          <div class="hole-slot" id="holeSlot1"></div>
        </div>
      </div>

      <div class="vs-text">vs</div>

      <div class="hand-group">
        <div class="hand-label label-h2">Hand 2</div>
        <div class="hole-cards-row">
          <div class="hole-slot" id="holeSlot2"></div>
          <div class="hole-slot" id="holeSlot3"></div>
        </div>
      </div>
    </div>

    <!-- Community cards (always in DOM, shown after hole cards selected) -->
    <div class="community-section" id="communitySection" style="display:none">
      <div class="board-slots" id="boardSlots"></div>
    </div>

  </div>

  <!-- Equity bar: always visible -->
  <div class="equity-bar" id="equityBar">
    <div class="equity-placeholder">Select hole cards to see equity</div>
  </div>
</div>

<script src="postflop.js"></script>
<script>

// ── Constants ───────────────────────────────────────────────────────────────

const PICKER_RANKS = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
const PICKER_SUITS = [
  { ch: 's', sym: '\u2660', cls: 'suit-black' },
  { ch: 'h', sym: '\u2665', cls: 'suit-red'   },
  { ch: 'd', sym: '\u2666', cls: 'suit-red'   },
  { ch: 'c', sym: '\u2663', cls: 'suit-black' },
];

const SUIT_MAP = {
  h: { sym: '♥', cls: 'red'   },
  d: { sym: '♦', cls: 'red'   },
  c: { sym: '♣', cls: 'black' },
  s: { sym: '♠', cls: 'black' },
};

// Hand type order for JSON file lookup (matches Rust generation order)
function buildHandOrder() {
  const ranks = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
  const order = [];
  for (let i = 0; i < 13; i++) order.push(ranks[i] + ranks[i]);
  for (let i = 0; i < 12; i++)
    for (let j = i + 1; j < 13; j++)
      order.push(ranks[i] + ranks[j] + 's');
  for (let i = 0; i < 12; i++)
    for (let j = i + 1; j < 13; j++)
      order.push(ranks[i] + ranks[j] + 'o');
  return order;
}

const HAND_TYPE_ORDER = buildHandOrder();

// ── State ───────────────────────────────────────────────────────────────────

let holeCards  = [null, null, null, null]; // [h1c1, h1c2, h2c1, h2c2]
let boardCards = [];                        // 0–5 community card strings
let activeSlot = 0;                         // 0-3=hole, 4-8=board, null=all done
let preflopEquity = null;                   // { pct1, pct2, tiePct, total }

// ── Helpers ─────────────────────────────────────────────────────────────────

function handsComplete() {
  return holeCards.every(c => c !== null);
}

function getAllUsedCards() {
  const used = new Set();
  for (const c of holeCards) { if (c) used.add(c); }
  for (const c of boardCards) used.add(c);
  return used;
}

function cardsToHandType(c1, c2) {
  const r1 = c1[0], r2 = c2[0], s1 = c1[1], s2 = c2[1];
  const i1 = PICKER_RANKS.indexOf(r1), i2 = PICKER_RANKS.indexOf(r2);
  if (i1 === i2) return r1 + r2;
  const [hi, lo] = i1 < i2 ? [r1, r2] : [r2, r1];
  return hi + lo + (s1 === s2 ? 's' : 'o');
}

function getMatchupInfo(ht1, ht2) {
  const i1 = HAND_TYPE_ORDER.indexOf(ht1);
  const i2 = HAND_TYPE_ORDER.indexOf(ht2);
  if (i1 <= i2) return { file: `equity_data/${ht1}_vs_${ht2}.json`, swapped: false };
  return { file: `equity_data/${ht2}_vs_${ht1}.json`, swapped: true };
}

function parseCardPairs(str) {
  const cards = [];
  for (let i = 0; i + 1 < str.length; i += 2) {
    const c = str[i] + str[i + 1];
    if ('AKQJT98765432'.includes(c[0]) && 'hdcs'.includes(c[1])) {
      cards.push(c);
    }
  }
  return cards;
}

// ── Card rendering ───────────────────────────────────────────────────────────

function renderCard(token) {
  const rankChar = token[0];
  const suitChar = token[1];
  const rank = rankChar === 'T' ? '10' : rankChar;
  const suit = SUIT_MAP[suitChar] || { sym: suitChar, cls: 'black' };
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    <span class="rank ${suit.cls}">${rank}</span>
    <span class="suit-sym ${suit.cls}">${suit.sym}</span>`;
  return div;
}

// ── Slot actions ─────────────────────────────────────────────────────────────

function setActiveSlot(i) {
  activeSlot = i;
  renderSlots();
  renderPickerGrid();
}

function clearHoleSlot(i) {
  holeCards[i] = null;
  activeSlot = i;
  // Clearing a hole card invalidates equity and board
  preflopEquity = null;
  boardCards = [];
  renderAll();
  updateEquityBar();
  pushHash();
}

function clearBoardFrom(idx) {
  boardCards = boardCards.slice(0, idx);
  activeSlot = 4 + idx;
  renderSlots();
  renderPickerGrid();
  updateEquityBar();
  pushHash();
}

function clearBoard() {
  boardCards = [];
  activeSlot = 4;
  renderSlots();
  renderPickerGrid();
  updateEquityBar();
  pushHash();
}

// ── Picker click handler ──────────────────────────────────────────────────────

function onPickerClick(cardStr) {
  // If card is already in a hole slot → clear that hole slot
  const holeIdx = holeCards.indexOf(cardStr);
  if (holeIdx !== -1) {
    clearHoleSlot(holeIdx);
    return;
  }

  // If card is in board → clear from that board index
  const boardIdx = boardCards.indexOf(cardStr);
  if (boardIdx !== -1) {
    clearBoardFrom(boardIdx);
    return;
  }

  // No active slot — all done
  if (activeSlot === null) return;

  if (activeSlot >= 0 && activeSlot <= 3) {
    // Place into hole card slot
    holeCards[activeSlot] = cardStr;

    // Find next empty hole slot
    let nextHole = null;
    for (let i = 0; i < 4; i++) {
      if (!holeCards[i]) { nextHole = i; break; }
    }

    if (nextHole !== null) {
      activeSlot = nextHole;
    } else {
      // All hole cards filled → move to community phase
      activeSlot = 4 + boardCards.length;
      // Trigger pre-flop equity fetch
      fetchPreflopEquity();
    }

    renderAll();
    pushHash();

  } else if (activeSlot >= 4 && activeSlot <= 8) {
    // Place into community slot
    boardCards.push(cardStr);
    if (boardCards.length < 5) {
      activeSlot = 4 + boardCards.length;
    } else {
      activeSlot = null;
    }

    renderSlots();
    renderPickerGrid();
    updateEquityBar();
    pushHash();
  }
}

// ── Equity fetch ──────────────────────────────────────────────────────────────

async function fetchPreflopEquity() {
  if (!handsComplete()) return;

  const ht1 = cardsToHandType(holeCards[0], holeCards[1]);
  const ht2 = cardsToHandType(holeCards[2], holeCards[3]);
  const { file, swapped } = getMatchupInfo(ht1, ht2);

  updateEquityBar(); // show loading state

  try {
    const resp = await fetch(file);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const p1 = swapped ? data.win_pct2 : data.win_pct1;
    const p2 = swapped ? data.win_pct1 : data.win_pct2;
    preflopEquity = { pct1: p1, pct2: p2, tiePct: data.tie_pct, total: data.total };
    updateEquityBar();
  } catch (e) {
    const ht1 = cardsToHandType(holeCards[0], holeCards[1]);
    const ht2 = cardsToHandType(holeCards[2], holeCards[3]);
    document.getElementById('equityBar').innerHTML =
      `<div class="error-msg">Could not load equity for ${ht1} vs ${ht2}.</div>`;
  }
}

// ── Equity bar ────────────────────────────────────────────────────────────────

function updateEquityBar() {
  const bar = document.getElementById('equityBar');

  if (!handsComplete()) {
    bar.innerHTML = `<div class="equity-placeholder">Select hole cards to see equity</div>`;
    return;
  }

  if (boardCards.length === 0) {
    if (!preflopEquity) {
      bar.innerHTML = `<div class="loading">Loading equity…</div>`;
      return;
    }
    const { pct1, pct2, tiePct, total } = preflopEquity;
    bar.innerHTML = `
      <div class="stage-label">Pre-flop</div>
      <div class="equity-section">
        <div class="split-bar-wrap">
          <div class="split-bar">
            <div class="bar-h1" style="width:${pct1}%"></div>
            <div class="bar-h2" style="width:${pct2}%"></div>
            <div class="bar-tie" style="width:${tiePct}%"></div>
          </div>
        </div>
        <div class="bar-labels">
          <div class="pct-h1">${pct1.toFixed(2)}%</div>
          <div class="pct-h2">${pct2.toFixed(2)}%</div>
        </div>
        <div class="ties-line">Ties: ${tiePct.toFixed(2)}% · ${total.toLocaleString()} boards</div>
      </div>`;
    return;
  }

  const h1 = [holeCards[0], holeCards[1]];
  const h2 = [holeCards[2], holeCards[3]];
  const result = Postflop.calculateEquity(h1, h2, boardCards);
  if (!result) {
    bar.innerHTML = `<div class="loading">Calculating…</div>`;
    return;
  }

  const { pct1, pct2, tiePct, total } = result;
  const stageLabels = { 1: '1 Card', 2: '2 Cards', 3: 'Flop', 4: 'Turn', 5: 'River' };
  const stageLabel = stageLabels[boardCards.length] || '';

  bar.innerHTML = `
    <div class="stage-label">${stageLabel}</div>
    <div class="equity-section">
      <div class="split-bar-wrap">
        <div class="split-bar">
          <div class="bar-h1" style="width:${pct1}%"></div>
          <div class="bar-h2" style="width:${pct2}%"></div>
          <div class="bar-tie" style="width:${tiePct}%"></div>
        </div>
      </div>
      <div class="bar-labels">
        <div class="pct-h1">${pct1.toFixed(2)}%</div>
        <div class="pct-h2">${pct2.toFixed(2)}%</div>
      </div>
      <div class="ties-line">Ties: ${tiePct.toFixed(2)}% · ${total.toLocaleString()} board${total !== 1 ? 's' : ''}</div>
    </div>`;
}

// ── Render functions ──────────────────────────────────────────────────────────

function renderSlots() {
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById('holeSlot' + i);
    if (!el) continue;

    const card = holeCards[i];
    const isActive = activeSlot === i;

    el.className = 'hole-slot';
    if (isActive) el.classList.add('slot-active');
    el.innerHTML = '';
    el.onclick = null;

    if (card) {
      el.classList.add('filled');
      const cardEl = renderCard(card);
      el.appendChild(cardEl);
      el.onclick = () => clearHoleSlot(i);
    } else {
      el.textContent = isActive ? '' : '+';
      el.onclick = () => setActiveSlot(i);
    }
  }

  for (let i = 0; i < 5; i++) {
    const el = document.getElementById('boardSlot' + i);
    if (!el) continue;

    const card = boardCards[i];
    const isActive = activeSlot === 4 + i;
    const isNextAvailable = (i === boardCards.length) && handsComplete();
    const isBeyond = i > boardCards.length;

    el.className = 'board-slot';
    if (isActive) el.classList.add('slot-active');
    if (isBeyond) el.classList.add('slot-inactive');
    el.innerHTML = '';
    el.onclick = null;

    if (card) {
      el.classList.add('filled');
      const cardEl = renderCard(card);
      el.appendChild(cardEl);
      el.onclick = () => clearBoardFrom(i);
    } else if (isActive || isNextAvailable) {
      el.textContent = isActive ? '' : '+';
      if (isNextAvailable && !isActive) {
        el.onclick = () => setActiveSlot(4 + i);
      }
    } else if (!isBeyond) {
      el.textContent = '+';
    }
  }
}

function renderPickerGrid() {
  const used = getAllUsedCards();
  const allDone = activeSlot === null;

  for (const suit of PICKER_SUITS) {
    for (const rank of PICKER_RANKS) {
      const cardStr = rank + suit.ch;
      const cell = document.getElementById('picker-' + cardStr);
      if (!cell) continue;

      // Reset classes
      cell.className = 'picker-cell ' + suit.cls;

      if (used.has(cardStr)) {
        cell.classList.add('picker-used');
      } else if (allDone) {
        cell.classList.add('picker-disabled');
      }
    }
  }
}

function renderCommunitySection() {
  const section = document.getElementById('communitySection');
  section.style.display = (handsComplete() || boardCards.length > 0) ? '' : 'none';
}

function renderAll() {
  renderSlots();
  renderPickerGrid();
  renderCommunitySection();
}

// ── Build permanent DOM structures ────────────────────────────────────────────

function buildPickerGrid() {
  const grid = document.getElementById('cardPickerGrid');
  grid.innerHTML = '';

  for (const suit of PICKER_SUITS) {
    for (const rank of PICKER_RANKS) {
      const cardStr = rank + suit.ch;
      const cell = document.createElement('div');
      cell.className = 'picker-cell ' + suit.cls;
      cell.id = 'picker-' + cardStr;
      const displayRank = rank === 'T' ? '10' : rank;
      cell.innerHTML = `<span class="picker-rank">${displayRank}</span><span class="picker-suit">${suit.sym}</span>`;
      cell.addEventListener('click', () => onPickerClick(cardStr));
      grid.appendChild(cell);
    }
  }
}

function buildBoardSlots() {
  const container = document.getElementById('boardSlots');
  container.innerHTML = '';

  for (let i = 0; i < 5; i++) {
    if (i === 3 || i === 4) {
      const gap = document.createElement('div');
      gap.className = 'board-slot-gap';
      container.appendChild(gap);
    }
    const slot = document.createElement('div');
    slot.className = 'board-slot';
    slot.id = 'boardSlot' + i;
    container.appendChild(slot);
  }
}

// ── URL hash state ────────────────────────────────────────────────────────────

function pushHash() {
  const h1str = holeCards[0] && holeCards[1] ? holeCards[0] + holeCards[1] : '';
  const h2str = holeCards[2] && holeCards[3] ? holeCards[2] + holeCards[3] : '';
  const boardStr = boardCards.join('');

  const parts = [];
  if (h1str) parts.push(h1str);
  if (h2str) parts.push(h2str);
  if (boardStr) parts.push(boardStr);

  const hash = parts.length > 0 ? '#' + parts.join('/') : '';
  history.replaceState(null, '', hash || location.pathname);
}

function loadFromHash() {
  const hash = location.hash.replace('#', '');
  if (!hash) return;

  const parts = hash.split('/');
  const h1Cards    = parts[0] ? parseCardPairs(parts[0]) : [];
  const h2Cards    = parts[1] ? parseCardPairs(parts[1]) : [];
  const boardParsed = parts[2] ? parseCardPairs(parts[2]) : [];

  // Validate: no duplicate cards
  const all = [...h1Cards, ...h2Cards, ...boardParsed];
  if (new Set(all).size !== all.length) return;

  if (h1Cards[0]) holeCards[0] = h1Cards[0];
  if (h1Cards[1]) holeCards[1] = h1Cards[1];
  if (h2Cards[0]) holeCards[2] = h2Cards[0];
  if (h2Cards[1]) holeCards[3] = h2Cards[1];
  boardCards = boardParsed.slice(0, 5);

  // Set activeSlot to first unfilled hole slot, then first available board slot
  let next = null;
  for (let i = 0; i < 4; i++) {
    if (!holeCards[i]) { next = i; break; }
  }
  if (next === null && handsComplete()) {
    next = boardCards.length < 5 ? 4 + boardCards.length : null;
  }
  activeSlot = next !== null ? next : (handsComplete() && boardCards.length === 5 ? null : 0);
}

window.addEventListener('hashchange', () => {
  holeCards = [null, null, null, null];
  boardCards = [];
  activeSlot = 0;
  preflopEquity = null;
  loadFromHash();
  renderAll();
  updateEquityBar();
  if (handsComplete()) fetchPreflopEquity();
});

// ── Init ──────────────────────────────────────────────────────────────────────

buildPickerGrid();
buildBoardSlots();
loadFromHash();
renderAll();
updateEquityBar();
if (handsComplete()) fetchPreflopEquity();

</script>
</body>
</html>
