<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pocketduel — Poker Equity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0d17;
    --surface:   #16162a;
    --surface2:  #1e1e38;
    --text:      #e2e8f0;
    --muted:     #6b7280;
    --hand1:     #4f9cf9;
    --hand1-bg:  #1e3a5f;
    --hand2:     #f97316;
    --hand2-bg:  #3d1f0a;
    --red-suit:  #ef4444;
    --card-bg:   #f0ede8;
    --card-text: #111111;
    --active:    #fbbf24;
    --empty-border: #6060a8;
    --empty-color:  #7070b8;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Atkinson Hyperlegible Mono", ui-monospace, monospace;
    font-optical-sizing: auto;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  /* ── Picker section (left panel desktop / fixed bottom mobile) ── */
  .picker-section {
    background: var(--surface);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    padding: 6px 5px 8px;
    border-top: 3px solid #4a4a8a;
  }

  .picker-section-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    margin-bottom: 5px;
    flex-shrink: 0;
    display: none;
  }

  /* ── Main section ── */
  .main-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Scrollable content ── */
  .matchup-scroll {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 16px 12px 10px;
  }

  /* ── Hands display ── */
  .hands-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .hand-group {
    display: flex;
  }

  .hole-cards-row {
    display: flex;
    gap: 6px;
  }

  .vs-text {
    font-size: clamp(20px, 5.5vmin, 30px);
    font-weight: 900;
    color: var(--text);
    align-self: center;
    padding: 0 6px;
    letter-spacing: -0.03em;
    opacity: 0.55;
  }

  /* ── Card slots ── */
  .hole-slot {
    width: clamp(44px, 13vmin, 64px);
    height: clamp(62px, 18vmin, 90px);
    border: 2px dashed var(--empty-border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--empty-color);
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }

  /* Subtle color hint: left pair = hand1, right pair = hand2 */
  #handGroup1 .hole-slot { border-color: #3a5888; color: #5a78b8; }
  #handGroup2 .hole-slot { border-color: #703820; color: #a05030; }

  .hole-slot.slot-active {
    border: 2.5px solid var(--active) !important;
    box-shadow: 0 0 10px rgba(251, 191, 36, 0.45), 0 0 20px rgba(251, 191, 36, 0.15);
    color: var(--active);
  }

  .hole-slot.filled {
    border: none;
    cursor: pointer;
    padding: 0;
    color: inherit;
  }

  .hole-slot.filled:hover {
    filter: brightness(0.82);
  }

  .hole-slot.filled.slot-active {
    outline: 2.5px solid var(--active);
    outline-offset: 3px;
    border: none;
    box-shadow: 0 0 10px rgba(251, 191, 36, 0.45);
    cursor: pointer;
  }

  .hole-slot.filled .card {
    width: 100%;
    height: 100%;
    margin: 0;
    border-radius: 6px;
  }

  /* Portrait playing card */
  .card {
    background: var(--card-bg);
    color: var(--card-text);
    border-radius: 6px;
    width: clamp(44px, 13vmin, 64px);
    height: clamp(62px, 18vmin, 90px);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 3px 5px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.55);
    position: relative;
    flex-shrink: 0;
  }

  .card .rank {
    font-size: clamp(18px, 5.5vmin, 28px);
    font-weight: 800;
    line-height: 1;
    align-self: flex-start;
  }

  .card .suit-sym {
    font-size: clamp(18px, 5.5vmin, 28px);
    line-height: 1;
    align-self: flex-end;
  }

  .card .red   { color: var(--red-suit); }
  .card .black { color: #111; }

  /* ── Community cards section ── */
  .community-section {
    padding: 0 2px 10px;
    display: flex;
    justify-content: center;
    transition: opacity 0.2s;
  }

  /* Dimmed when hole cards are incomplete */
  .community-section.dimmed {
    opacity: 0.3;
    pointer-events: none;
  }

  .board-slots {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .board-slot-gap {
    width: 12px;
  }

  .board-slot {
    width: clamp(36px, 10.5vmin, 56px);
    height: clamp(50px, 14.5vmin, 78px);
    border: 2px dashed var(--empty-border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--empty-color);
    font-size: 18px;
    font-weight: 700;
    cursor: default;
    flex-shrink: 0;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }

  .board-slot.slot-active {
    border: 2.5px solid var(--active) !important;
    box-shadow: 0 0 10px rgba(251, 191, 36, 0.45), 0 0 20px rgba(251, 191, 36, 0.15);
    color: var(--active);
  }

  .board-slot.filled {
    border: none;
    cursor: pointer;
    padding: 0;
    color: inherit;
  }

  .board-slot.filled:hover {
    filter: brightness(0.82);
  }

  .board-slot.filled.slot-active {
    outline: 2.5px solid var(--active);
    outline-offset: 3px;
    border: none;
    box-shadow: 0 0 10px rgba(251, 191, 36, 0.45);
    cursor: pointer;
  }

  .board-slot.filled .card {
    width: 100%;
    height: 100%;
    margin: 0;
    border-radius: 6px;
  }

  /* ── Equity bar — always visible, always same size ── */
  .equity-bar {
    flex-shrink: 0;
    padding: 10px 14px;
    border-top: 2px solid #3a3a6a;
    background: var(--surface);
  }

  .equity-bar .stage-label {
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
    transition: opacity 0.2s;
    min-height: 1em;
  }

  /* Disabled state: hide labels & splits but keep their height */
  .equity-bar.disabled .bar-labels { visibility: hidden; }
  .equity-bar.disabled .splits-line { visibility: hidden; }

  /* ── Equity bars ── */
  .equity-section { display: flex; flex-direction: column; gap: 10px; }

  .split-bar-wrap {
    position: relative; height: 30px; border-radius: 6px;
    overflow: hidden; background: #2a2a4a;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
  }

  .split-bar { display: flex; height: 100%; }

  .bar-h1  { background: var(--hand1); transition: width 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
  .bar-h2  { background: var(--hand2); transition: width 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
  .bar-tie { background: #44445a;      transition: width 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94); }

  .bar-labels {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 5px;
    min-height: 1em;
  }

  .pct-h1 {
    color: var(--hand1);
    font-size: clamp(16px, 3.5vw, 24px);
    font-weight: 700;
    transition: opacity 0.2s;
    min-width: 4ch;
  }
  .pct-h2 {
    color: var(--hand2);
    font-size: clamp(16px, 3.5vw, 24px);
    font-weight: 700;
    text-align: right;
    transition: opacity 0.2s;
    min-width: 4ch;
  }

  .splits-line {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    margin-top: 5px;
    min-height: 1em;
  }

  .error-msg {
    text-align: center;
    color: #f87171;
    font-size: 11px;
    padding: 8px;
    line-height: 1.5;
  }

  /* ── Card picker grid ── */
  .card-picker-grid {
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    gap: 2px;
    flex: 1;
  }

  .picker-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    padding: 3px 1px;
    border-radius: 3px;
    cursor: pointer;
    user-select: none;
    background: var(--surface2);
    border: 1px solid transparent;
    transition: filter 0.1s;
  }

  .picker-cell:hover:not(.picker-disabled) {
    filter: brightness(1.5);
  }

  .picker-rank {
    font-size: clamp(11px, 3.2vmin, 15px);
    font-weight: 800;
    line-height: 1;
  }

  .picker-suit {
    font-size: clamp(9px, 2.5vmin, 12px);
    line-height: 1;
  }

  .picker-cell.suit-red   { color: var(--red-suit); }
  .picker-cell.suit-black { color: #c0c8d8; }

  /* Used cards in picker: fully disabled — only the display area allows deselect */
  .picker-cell.picker-disabled {
    opacity: 0.16;
    cursor: default;
    pointer-events: none;
  }

  /* ── Hand-group color underlines ── */
  #handGroup1 {
    border-bottom: 3px solid var(--hand1);
    padding-bottom: 6px;
  }

  #handGroup2 {
    border-bottom: 3px solid var(--hand2);
    padding-bottom: 6px;
  }

  /* ── Mobile layout ── */
  @media (max-width: 767px) {
    body { overflow: hidden; }

    .picker-section {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      padding: 5px 4px calc(8px + env(safe-area-inset-bottom, 0px));
      border-top: 3px solid #5555a0;
    }

    .main-section {
      overflow-y: auto;
      padding-bottom: 186px;
    }

    .matchup-scroll {
      padding: 14px 10px 10px;
    }
  }

  /* ── Desktop layout ── */
  @media (min-width: 768px) {
    body { flex-direction: row; }

    .picker-section {
      flex: 0 0 36%;
      border-top: none;
      border-right: 2px solid #3a3a6a;
      padding: 12px 10px;
      overflow-y: auto;
      justify-content: flex-start;
    }

    .picker-section-label {
      display: block;
    }

    .card-picker-grid {
      flex: none;
    }

    .picker-cell {
      padding: 6px 2px;
    }

    .picker-rank {
      font-size: clamp(12px, 1.3vw, 17px);
    }

    .picker-suit {
      font-size: clamp(10px, 1.0vw, 13px);
    }

    .main-section {
      flex: 1;
      overflow: hidden;
    }

    .matchup-scroll {
      padding: 20px 28px 12px;
    }

    .hole-slot {
      width: clamp(48px, 7.5vw, 74px);
      height: clamp(68px, 10.5vw, 104px);
    }

    .card {
      width: clamp(48px, 7.5vw, 74px);
      height: clamp(68px, 10.5vw, 104px);
    }

    .board-slot {
      width: clamp(38px, 5.8vw, 60px);
      height: clamp(54px, 8.2vw, 84px);
    }

    .equity-bar {
      padding: 12px 28px;
    }
  }
</style>
</head>
<body>

<!-- Picker section: left panel (desktop) / fixed bottom (mobile) -->
<div class="picker-section" id="pickerSection">
  <div class="picker-section-label">Select a Card</div>
  <div class="card-picker-grid" id="cardPickerGrid"></div>
</div>

<!-- Main section: right panel (desktop) / scrollable content (mobile) -->
<div class="main-section">
  <div class="matchup-scroll" id="matchupScroll">

    <!-- Hole cards display -->
    <div class="hands-display" id="handsDisplay">
      <div class="hand-group" id="handGroup1">
        <div class="hole-cards-row">
          <div class="hole-slot slot-active" id="holeSlot0"></div>
          <div class="hole-slot" id="holeSlot1"></div>
        </div>
      </div>

      <div class="vs-text">vs</div>

      <div class="hand-group" id="handGroup2">
        <div class="hole-cards-row">
          <div class="hole-slot" id="holeSlot2"></div>
          <div class="hole-slot" id="holeSlot3"></div>
        </div>
      </div>
    </div>

    <!-- Community cards: shown when hands complete or board has any card -->
    <div class="community-section" id="communitySection" style="display:none">
      <div class="board-slots" id="boardSlots"></div>
    </div>

  </div>

  <!-- Equity bar: always visible, always same height -->
  <div class="equity-bar disabled" id="equityBar">
    <div class="stage-label" id="equityStageLabel">Select hole cards to see equity</div>
    <div class="equity-section">
      <div class="split-bar-wrap">
        <div class="split-bar">
          <div class="bar-h1" id="barH1" style="width:0%"></div>
          <div class="bar-h2" id="barH2" style="width:0%"></div>
          <div class="bar-tie" id="barTie" style="width:100%"></div>
        </div>
      </div>
      <div class="bar-labels">
        <div class="pct-h1" id="pctH1"></div>
        <div class="pct-h2" id="pctH2"></div>
      </div>
      <div class="splits-line" id="splitsLine"></div>
    </div>
  </div>
</div>

<script src="postflop.js"></script>
<script>

// ── Constants ───────────────────────────────────────────────────────────────

const PICKER_RANKS = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
const PICKER_SUITS = [
  { ch: 's', sym: '\u2660', cls: 'suit-black' },
  { ch: 'h', sym: '\u2665', cls: 'suit-red'   },
  { ch: 'd', sym: '\u2666', cls: 'suit-red'   },
  { ch: 'c', sym: '\u2663', cls: 'suit-black' },
];

const SUIT_MAP = {
  h: { sym: '♥', cls: 'red'   },
  d: { sym: '♦', cls: 'red'   },
  c: { sym: '♣', cls: 'black' },
  s: { sym: '♠', cls: 'black' },
};

function buildHandOrder() {
  const order = [];
  for (let i = 0; i < 13; i++) order.push(PICKER_RANKS[i] + PICKER_RANKS[i]);
  for (let i = 0; i < 12; i++)
    for (let j = i + 1; j < 13; j++)
      order.push(PICKER_RANKS[i] + PICKER_RANKS[j] + 's');
  for (let i = 0; i < 12; i++)
    for (let j = i + 1; j < 13; j++)
      order.push(PICKER_RANKS[i] + PICKER_RANKS[j] + 'o');
  return order;
}

const HAND_TYPE_ORDER = buildHandOrder();

// ── State ───────────────────────────────────────────────────────────────────

let holeCards  = [null, null, null, null];
let boardCards = [null, null, null, null, null]; // sparse 5-slot array
let activeSlot = 0;   // 0-3=hole, 4-8=board slot, null=all done
let preflopEquity = null;

// ── Helpers ─────────────────────────────────────────────────────────────────

function handsComplete() {
  return holeCards.every(c => c !== null);
}

function activeBoardCards() {
  return boardCards.filter(c => c !== null);
}

function getAllUsedCards() {
  const used = new Set();
  for (const c of holeCards) { if (c) used.add(c); }
  for (const c of boardCards) { if (c) used.add(c); }
  return used;
}

// Find next empty board slot, searching from afterBoardIdx+1 then wrapping.
function nextEmptyBoardSlot(afterBoardIdx) {
  for (let i = afterBoardIdx + 1; i < 5; i++) {
    if (!boardCards[i]) return 4 + i;
  }
  for (let i = 0; i <= afterBoardIdx; i++) {
    if (!boardCards[i]) return 4 + i;
  }
  return null; // all 5 filled
}

function cardsToHandType(c1, c2) {
  const r1 = c1[0], r2 = c2[0], s1 = c1[1], s2 = c2[1];
  const i1 = PICKER_RANKS.indexOf(r1), i2 = PICKER_RANKS.indexOf(r2);
  if (i1 === i2) return r1 + r2;
  const [hi, lo] = i1 < i2 ? [r1, r2] : [r2, r1];
  return hi + lo + (s1 === s2 ? 's' : 'o');
}

function getMatchupInfo(ht1, ht2) {
  const i1 = HAND_TYPE_ORDER.indexOf(ht1);
  const i2 = HAND_TYPE_ORDER.indexOf(ht2);
  if (i1 <= i2) return { file: `equity_data/${ht1}_vs_${ht2}.json`, swapped: false };
  return { file: `equity_data/${ht2}_vs_${ht1}.json`, swapped: true };
}

// ── Card rendering ───────────────────────────────────────────────────────────

function renderCard(token) {
  const rank = token[0] === 'T' ? '10' : token[0];
  const suit = SUIT_MAP[token[1]] || { sym: token[1], cls: 'black' };
  const div = document.createElement('div');
  div.className = 'card';
  const rankEl = document.createElement('span');
  rankEl.className = 'rank ' + suit.cls;
  rankEl.textContent = rank;
  const suitEl = document.createElement('span');
  suitEl.className = 'suit-sym ' + suit.cls;
  suitEl.textContent = suit.sym;
  div.appendChild(rankEl);
  div.appendChild(suitEl);
  return div;
}

// ── Slot actions ─────────────────────────────────────────────────────────────

function setActiveSlot(i) {
  activeSlot = i;
  renderSlots();
  renderPickerGrid();
}

function clearHoleSlot(i) {
  holeCards[i] = null;
  activeSlot = i;
  preflopEquity = null;
  // Keep boardCards — community section stays visible but dimmed
  renderAll();
  updateEquityBar();
  pushHash();
}

function clearBoardSlot(i) {
  boardCards[i] = null;
  activeSlot = 4 + i;
  renderSlots();
  renderPickerGrid();
  updateEquityBar();
  pushHash();
}

// ── Picker click ──────────────────────────────────────────────────────────────

function onPickerClick(cardStr) {
  if (activeSlot === null) return;

  if (activeSlot >= 0 && activeSlot <= 3) {
    holeCards[activeSlot] = cardStr;

    let nextHole = null;
    for (let i = 0; i < 4; i++) {
      if (!holeCards[i]) { nextHole = i; break; }
    }

    if (nextHole !== null) {
      activeSlot = nextHole;
    } else {
      // All hole cards filled → go to first empty board slot
      activeSlot = nextEmptyBoardSlot(-1);
      fetchPreflopEquity();
    }

    renderAll();
    pushHash();

  } else if (activeSlot >= 4 && activeSlot <= 8) {
    const boardIdx = activeSlot - 4;
    boardCards[boardIdx] = cardStr;
    activeSlot = nextEmptyBoardSlot(boardIdx);
    renderSlots();
    renderPickerGrid();
    updateEquityBar();
    pushHash();
  }
}

// ── Equity fetch ──────────────────────────────────────────────────────────────

async function fetchPreflopEquity() {
  if (!handsComplete()) return;

  const ht1 = cardsToHandType(holeCards[0], holeCards[1]);
  const ht2 = cardsToHandType(holeCards[2], holeCards[3]);
  const { file, swapped } = getMatchupInfo(ht1, ht2);

  updateEquityBar(); // show loading state

  try {
    const resp = await fetch(file);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const p1 = swapped ? data.win_pct2 : data.win_pct1;
    const p2 = swapped ? data.win_pct1 : data.win_pct2;
    preflopEquity = { pct1: p1, pct2: p2, tiePct: data.tie_pct, total: data.total };
    updateEquityBar();
  } catch (e) {
    document.getElementById('equityStageLabel').textContent = `Could not load ${ht1} vs ${ht2}`;
    document.getElementById('equityBar').classList.add('disabled');
  }
}

// ── Equity bar ────────────────────────────────────────────────────────────────

function updateEquityBar() {
  if (!handsComplete()) {
    setEquityDisabled('Select hole cards to see equity');
    return;
  }

  const board = activeBoardCards();

  if (board.length === 0) {
    if (!preflopEquity) {
      setEquityDisabled('Loading equity\u2026');
      return;
    }
    const { pct1, pct2, tiePct, total } = preflopEquity;
    setEquityEnabled('Pre-flop', pct1, pct2, tiePct, total);
    return;
  }

  const h1 = [holeCards[0], holeCards[1]];
  const h2 = [holeCards[2], holeCards[3]];
  const result = Postflop.calculateEquity(h1, h2, board);
  if (!result) {
    setEquityDisabled('Calculating\u2026');
    return;
  }

  const { pct1, pct2, tiePct, total } = result;
  const stageLabels = { 1: '1 Card', 2: '2 Cards', 3: 'Flop', 4: 'Turn', 5: 'River' };
  setEquityEnabled(stageLabels[board.length] || '', pct1, pct2, tiePct, total);
}

function setEquityDisabled(msg) {
  document.getElementById('equityBar').classList.add('disabled');
  document.getElementById('equityStageLabel').textContent = msg;
  document.getElementById('barH1').style.width = '0%';
  document.getElementById('barH2').style.width = '0%';
  document.getElementById('barTie').style.width = '100%';
}

function setEquityEnabled(stageLabel, pct1, pct2, tiePct, total) {
  document.getElementById('equityBar').classList.remove('disabled');

  const labelEl = document.getElementById('equityStageLabel');
  if (labelEl.textContent !== stageLabel) {
    labelEl.style.opacity = '0.3';
    requestAnimationFrame(() => {
      labelEl.textContent = stageLabel;
      labelEl.style.opacity = '';
    });
  }

  document.getElementById('barH1').style.width = pct1 + '%';
  document.getElementById('barH2').style.width = pct2 + '%';
  document.getElementById('barTie').style.width = tiePct + '%';

  flashUpdate('pctH1', pct1.toFixed(2) + '%');
  flashUpdate('pctH2', pct2.toFixed(2) + '%');

  const splitsEl = document.getElementById('splitsLine');
  if (activeBoardCards().length === 5) {
    splitsEl.textContent = 'Final board';
  } else {
    splitsEl.textContent = `Split: ${tiePct.toFixed(2)}% \u00b7 ${total.toLocaleString()} possible board${total !== 1 ? 's' : ''}`;
  }
}

function flashUpdate(id, newText) {
  const el = document.getElementById(id);
  if (!el || el.textContent === newText) return;
  el.style.opacity = '0.3';
  requestAnimationFrame(() => {
    el.textContent = newText;
    requestAnimationFrame(() => { el.style.opacity = ''; });
  });
}

// ── Render functions ──────────────────────────────────────────────────────────

function renderSlots() {
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById('holeSlot' + i);
    if (!el) continue;

    const card = holeCards[i];
    const isActive = activeSlot === i;

    el.className = 'hole-slot';
    if (isActive) el.classList.add('slot-active');
    el.innerHTML = '';
    el.onclick = null;

    if (card) {
      el.classList.add('filled');
      el.appendChild(renderCard(card));
      el.onclick = () => clearHoleSlot(i);
    } else {
      el.textContent = isActive ? '' : '+';
      el.onclick = () => setActiveSlot(i);
    }
  }

  const handsOk = handsComplete();
  for (let i = 0; i < 5; i++) {
    const el = document.getElementById('boardSlot' + i);
    if (!el) continue;

    const card = boardCards[i];
    const isActive = activeSlot === 4 + i;

    el.className = 'board-slot';
    if (isActive && handsOk) el.classList.add('slot-active');
    el.innerHTML = '';
    el.onclick = null;

    if (card) {
      el.classList.add('filled');
      el.appendChild(renderCard(card));
      if (handsOk) el.onclick = () => clearBoardSlot(i);
    } else if (handsOk) {
      el.textContent = isActive ? '' : '+';
      el.onclick = () => setActiveSlot(4 + i);
    }
    // !handsOk && !card: empty slot, no text — dimmed by parent .community-section.dimmed
  }
}

function renderPickerGrid() {
  const used = getAllUsedCards();
  const allDone = activeSlot === null;

  for (const suit of PICKER_SUITS) {
    for (const rank of PICKER_RANKS) {
      const cardStr = rank + suit.ch;
      const cell = document.getElementById('picker-' + cardStr);
      if (!cell) continue;
      cell.className = 'picker-cell ' + suit.cls;
      if (used.has(cardStr) || allDone) {
        cell.classList.add('picker-disabled');
      }
    }
  }
}

function renderCommunitySection() {
  const section = document.getElementById('communitySection');
  const hasBoard = boardCards.some(c => c);
  const show = handsComplete() || hasBoard;
  section.style.display = show ? '' : 'none';
  section.classList.toggle('dimmed', show && !handsComplete());
}

function renderAll() {
  renderSlots();
  renderPickerGrid();
  renderCommunitySection();
}

// ── Build permanent DOM structures ────────────────────────────────────────────

function buildPickerGrid() {
  const grid = document.getElementById('cardPickerGrid');
  for (const suit of PICKER_SUITS) {
    for (const rank of PICKER_RANKS) {
      const cardStr = rank + suit.ch;
      const cell = document.createElement('div');
      cell.className = 'picker-cell ' + suit.cls;
      cell.id = 'picker-' + cardStr;
      const rankSpan = document.createElement('span');
      rankSpan.className = 'picker-rank';
      rankSpan.textContent = rank === 'T' ? '10' : rank;
      const suitSpan = document.createElement('span');
      suitSpan.className = 'picker-suit';
      suitSpan.textContent = suit.sym;
      cell.appendChild(rankSpan);
      cell.appendChild(suitSpan);
      cell.addEventListener('click', () => onPickerClick(cardStr));
      grid.appendChild(cell);
    }
  }
}

function buildBoardSlots() {
  const container = document.getElementById('boardSlots');
  container.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    if (i === 3 || i === 4) {
      const gap = document.createElement('div');
      gap.className = 'board-slot-gap';
      container.appendChild(gap);
    }
    const slot = document.createElement('div');
    slot.className = 'board-slot';
    slot.id = 'boardSlot' + i;
    container.appendChild(slot);
  }
}

// ── URL hash state ────────────────────────────────────────────────────────────
// Format: #<h1>/<h2>[/<board>]
// Each card slot: 2-char token (e.g. "Ah") or "x" for unknown/empty.
// h1, h2: always 2 slots.  board: always 5 slots (if section present).
// Example: #AhKs/QdJc/7cxx8sxx  (board slots 0=7c, 1=empty, 2=8s, 3-4=empty)

function encodeSlots(slots) {
  return slots.map(c => c || 'x').join('');
}

function parseSlotTokens(str, count) {
  const slots = [];
  let i = 0;
  while (slots.length < count && i < str.length) {
    if (str[i] === 'x') {
      slots.push(null);
      i++;
    } else {
      const c = str.slice(i, i + 2);
      slots.push(
        c.length === 2 && 'AKQJT98765432'.includes(c[0]) && 'hdcs'.includes(c[1]) ? c : null
      );
      i += 2;
    }
  }
  while (slots.length < count) slots.push(null);
  return slots;
}

function pushHash() {
  const anyHole  = holeCards.some(c => c);
  const anyBoard = boardCards.some(c => c);
  if (!anyHole && !anyBoard) {
    history.replaceState(null, '', location.pathname);
    return;
  }
  const h1 = encodeSlots([holeCards[0], holeCards[1]]);
  const h2 = encodeSlots([holeCards[2], holeCards[3]]);
  const parts = [h1, h2];
  if (anyBoard) parts.push(encodeSlots(boardCards));
  history.replaceState(null, '', '#' + parts.join('/'));
}

function loadFromHash() {
  const hash = location.hash.replace('#', '');
  if (!hash) return;

  const parts   = hash.split('/');
  const h1slots = parseSlotTokens(parts[0] || '', 2);
  const h2slots = parseSlotTokens(parts[1] || '', 2);
  const bslots  = parseSlotTokens(parts[2] || '', 5);

  // Reject duplicate cards
  const all = [...h1slots, ...h2slots, ...bslots].filter(c => c);
  if (new Set(all).size !== all.length) return;

  holeCards  = [...h1slots, ...h2slots];
  boardCards = bslots;

  // Derive activeSlot: first empty hole slot, then first empty board slot
  const holeEmpty = holeCards.findIndex(c => !c);
  if (holeEmpty !== -1) {
    activeSlot = holeEmpty;
  } else if (handsComplete()) {
    const boardEmpty = boardCards.findIndex(c => !c);
    activeSlot = boardEmpty === -1 ? null : 4 + boardEmpty;
  }
}

window.addEventListener('hashchange', () => {
  holeCards  = [null, null, null, null];
  boardCards = [null, null, null, null, null];
  activeSlot = 0;
  preflopEquity = null;
  loadFromHash();
  renderAll();
  updateEquityBar();
  if (handsComplete()) fetchPreflopEquity();
});

// ── Init ──────────────────────────────────────────────────────────────────────

buildPickerGrid();
buildBoardSlots();
loadFromHash();
renderAll();
updateEquityBar();
if (handsComplete()) fetchPreflopEquity();

</script>
